# Sprint 6 / S6.1.4a — recorded Langfuse traces POST.
interactions:
  - request:
      method: POST
      uri: http://langfuse.test/api/public/traces
      headers:
        Authorization: Bearer <lf-key-redacted>
        Content-Type: application/json
      body: |-
        {
          "id": "11111111-1111-1111-1111-111111111111",
          "name": "bedrock_invocation",
          "userId": "22222222-2222-2222-2222-222222222222",
          "metadata": {
            "model": "claude-sonnet-4-6",
            "status": "ok",
            "routing_reason": "by_purpose",
            "policy_revision": 5
          },
          "input": {"snippet": "review this PR"},
          "output": {"snippet": "looks good"},
          "usage": {"input": 10, "output": 5, "totalCost": 0.01},
          "latency": 200
        }
    response:
      status_code: 200
      headers:
        Content-Type: application/json
      body: |-
        {"id": "11111111-1111-1111-1111-111111111111", "status": "accepted"}

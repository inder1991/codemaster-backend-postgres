    end_line: 12
  - file: "src/api/handler.ts"
    title: "prefer-const"
    body: "'count' is never reassigned. Use 'const' instead."
    severity: "suggestion"
    category: "style"
    start_line: 25
    end_line: 25
  - file: "src/api/handler.ts"
    title: "eqeqeq"

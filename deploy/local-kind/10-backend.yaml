# codemaster-backend: shared env + migrate Job + ONE combined Deployment/Service.
# The image (codemaster-backend:dev) is built from the repo Dockerfile and `kind load`-ed (imagePullPolicy
# Never — never pull from a registry). The combined entrypoint (apps/backend/src/main.js) runs the HTTP API
# + review worker + outbox-dispatcher worker in a SINGLE fail-loud process — the production single-pod shape.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-env
  namespace: codemaster-backend
data:
  CODEMASTER_PG_CORE_DSN: "postgresql://postgres:devpass@pg-postgresql:5432/postgres"
  # This namespace runs the PRE-CUTOVER temporal-mode shape (CODEMASTER_RUNTIME_MODE unset =
  # temporal). The postgres-mode cutover smoke lives in its OWN isolated namespace with no
  # Temporal server at all — see 20-postgres-cutover.yaml.
  VAULT_ADDR: "http://vault:8200"
  VAULT_TOKEN: "devroot"
  CODEMASTER_VAULT_SECRET_SOURCE: "vault-api"
  CODEMASTER_AUTH_ROUTES_ENABLED: "true"
  CODEMASTER_SECURE_COOKIES: "false"
  CODEMASTER_API_PORT: "8080"
  CODEMASTER_API_HOST: "0.0.0.0"
  # The combined pod's review worker → the in-namespace Temporal dev server (auto-created `default` ns);
  # explicit ns+queue are required because the image sets NODE_ENV=production (the worker's real-cluster guard).
  TEMPORAL_ADDRESS: "temporal-frontend:7233"
  TEMPORAL_NAMESPACE: "default"
  # Must MATCH the emitter's task_queue (github_webhook_persistence.ts REVIEW_TASK_QUEUE = "review-default",
  # the Python-parity value pinned by outbox_payloads.v1.parity.test.ts). The prior "review-pull-request-dualrun"
  # is a dualrun-isolation queue that's pointless here (this backend runs its OWN Temporal), and it left the
  # worker polling a queue the emitter never targets → dispatched reviews sat unpicked. FOLLOW-UP: have the
  # emitter + worker read ONE shared task-queue config so they cannot drift (docs/audits/2026-06-07-ts-smoke-findings.md F-3).
  TEMPORAL_TASK_QUEUE: "review-default"
  # Embedder (ADR-0059): the combined pod runs the review worker, whose buildActivities() resolves the
  # platform (Qwen3) embedder. `stub://recording` is the dev sentinel for kind (no Qwen service); the review
  # boots + the embedder-dependent stages (dedup, retrieve-knowledge) use the recording stub.
  CODEMASTER_QWEN_DSN: "stub://recording"
  # Per-review routing (ADR-0073): the worker NO LONGER reads CODEMASTER_GITHUB_INSTALLATION_ID — the per-PR
  # numeric installation id is threaded through each GitHub activity input. A real PR review needs the GitHub
  # App private key in Vault (secret/codemaster/github/app); the per-PR id comes from the webhook payload.
  # NB: the placeholder ("reviewing this PR…") comment is now ENABLED BY DEFAULT in code (opt-out only via
  # CODEMASTER_REVIEW_PLACEHOLDER_ENABLED="0"), so no env key is needed here to turn it on.
---
# One-shot schema migration (node-pg-migrate up). No-op when the schema is already at head.
apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: codemaster-backend
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: codemaster-backend:dev
          imagePullPolicy: Never
          command: ["npm", "run", "migrate:up"]
          envFrom:
            - configMapRef: { name: backend-env }
---
# THE single combined pod: HTTP API + review worker + outbox-dispatcher worker (main.js, fail-loud). Replica-
# safe — the outbox-dispatcher singleton is enforced at the Temporal workflow level (fixed workflowId +
# USE_EXISTING), so scaling replicas is safe.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: codemaster-backend
  labels: { app: backend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: codemaster-backend:dev
          imagePullPolicy: Never
          # Default CMD = the combined entrypoint (apps/backend/src/main.js) — API + both workers, fail-loud.
          envFrom:
            - configMapRef: { name: backend-env }
          env:
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
            - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
          ports: [{ containerPort: 8080, name: http }]
          # CS3 probes: /readyz aggregates the REAL dependency checks (DB SELECT 1, Vault sys/health,
          # runtime-loop health in postgres mode) — a dead loop or dead DB pulls the pod from rotation.
          # /healthz is wedge-only liveness (no dependency checks — dependency failures must never
          # restart-storm the pod; CS3.2).
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
          # Low REQUESTS (scheduling) — the kind node is shared + memory-tight (~96% allocated). Limits stay
          # generous (overcommit allowed) so a real review (clone + tree-sitter + static analysis + LLM) has headroom.
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits: { cpu: "2", memory: 1536Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: codemaster-backend
spec:
  selector: { app: backend }
  ports:
    - { port: 8080, targetPort: 8080 }

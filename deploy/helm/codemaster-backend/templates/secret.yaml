{{- /*
DEV/kind ONLY. When vault.mode == "token" and vault.token.create == true, the
chart materializes VAULT_TOKEN + the PG DSN into a Secret the pod consumes via
secretKeyRef. NEVER enable this in a real environment — production uses
vault.mode=agent (no chart-managed secret material).
*/ -}}
{{- if and (eq .Values.vault.mode "token") .Values.vault.token.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "codemaster-backend.devSecretName" . }}
  labels:
    {{- include "codemaster-backend.labels" . | nindent 4 }}
  annotations:
    codemaster.acme.com/dev-only: "true"
type: Opaque
stringData:
  {{- with .Values.vault.token.vaultToken }}
  VAULT_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.vault.token.pgCoreDsn }}
  CODEMASTER_PG_CORE_DSN: {{ . | quote }}
  {{- end }}
{{- end }}

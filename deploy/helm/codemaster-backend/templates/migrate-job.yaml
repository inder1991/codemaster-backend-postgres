{{- /*
Schema migration as a pre-install/pre-upgrade Helm hook. Runs BEFORE the
Deployment rolls, so the app never starts against an un-migrated schema. Uses
the SAME Vault secret injection as the app, BUT with agent-pre-populate-only so
the Vault Agent renders the DSN via an init container and does NOT leave a
sidecar running (which would keep the Job from ever completing).
*/ -}}
{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "codemaster-backend.fullname" . }}-migrate
  labels:
    {{- include "codemaster-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: {{ .Values.migrate.hookWeight | quote }}
    helm.sh/hook-delete-policy: {{ .Values.migrate.hookDeletePolicy }}
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "codemaster-backend.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
      annotations:
        {{- /* onlyEnv: the migrate hook needs only the PG DSN (runtime-env), not the four app file
               secrets — so its Vault role can be scoped to just secret/data/codemaster/postgres/app. */ -}}
        {{- with (include "codemaster-backend.vaultAgentAnnotations" (dict "root" . "onlyEnv" true)) }}
        {{- . | nindent 8 }}
        {{- end }}
        {{- if eq .Values.vault.mode "agent" }}
        vault.hashicorp.com/agent-pre-populate-only: "true"
        {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "codemaster-backend.serviceAccountName" . }}
      # secretSource=vault → the migrate job resolves the DSN from Vault via SA-auth, so the SA JWT must mount.
      automountServiceAccountToken: {{ if eq .Values.secretSource "vault" }}true{{ else }}{{ .Values.serviceAccount.automountServiceAccountToken }}{{ end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "codemaster-backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if include "codemaster-backend.usesEnvWrapper" . }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -a
              . {{ .Values.vault.secretsDir }}/runtime-env
              set +a
              exec npm run migrate:up
          {{- else if eq .Values.secretSource "vault" }}
          # vault SA-auth: there is no agent-rendered env-file, so resolve the DB DSN from Vault (the pod's
          # ServiceAccount login) and export it before migrating. resolve_dsn fails loud if Vault is unreachable.
          command: ["/bin/sh", "-c"]
          args:
            - |
              export CODEMASTER_PG_CORE_DSN="$(node apps/backend/src/resolve_dsn.js)"
              exec npm run migrate:up
          {{- else }}
          command: ["npm", "run", "migrate:up"]
          {{- end }}
          env:
            # HOME -> /tmp (writable mount) so npm's log/cache writes don't hit the read-only rootfs
            # and mask the real node-pg-migrate error on a failed migration.
            - name: HOME
              value: /tmp
            - name: npm_config_cache
              value: /tmp/.npm
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            # The config (CODEMASTER_SECRET_SOURCE, VAULT_ADDR + the SA-auth selectors for resolve_dsn, the
            # PG DSN parts in openshift mode) the migrate step reads — same ConfigMap as the app.
            - configMapRef:
                name: {{ include "codemaster-backend.fullname" . }}-config
            {{- if eq .Values.vault.mode "token" }}
            {{- if .Values.vault.token.existingSecret }}
            - secretRef:
                name: {{ .Values.vault.token.existingSecret }}
            {{- else if .Values.vault.token.create }}
            - secretRef:
                name: {{ include "codemaster-backend.devSecretName" . }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
{{- end }}

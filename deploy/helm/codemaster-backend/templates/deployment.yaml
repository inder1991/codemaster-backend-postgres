apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codemaster-backend.fullname" . }}
  labels:
    {{- include "codemaster-backend.labels" . | nindent 4 }}
  {{- with (include "codemaster-backend.commonAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  # /readyz is shallow (HTTP-bound, not worker-ready); minReadySeconds makes the new pod
  # survive the worker-connect window before the rollout advances under maxUnavailable:0.
  minReadySeconds: {{ .Values.minReadySeconds }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "codemaster-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codemaster-backend.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.rollOnConfigChange }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with (include "codemaster-backend.vaultAgentAnnotations" (dict "root" . "onlyEnv" false)) }}
        {{- . | nindent 8 }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "codemaster-backend.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "codemaster-backend.selectorLabels" . | nindent 20 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      {{- else }}
      # Default soft zone spread (ScheduleAnyway keeps single-zone kind/dev schedulable).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "codemaster-backend.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "codemaster-backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if include "codemaster-backend.usesEnvWrapper" . }}
          # Agent mode: source the Vault-rendered env-file (PG DSN etc.) then exec.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -a
              . {{ .Values.vault.secretsDir }}/runtime-env
              set +a
              exec node apps/backend/src/main.js
          {{- end }}
          {{- if gt (int .Values.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ports.http }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "codemaster-backend.fullname" . }}-config
            {{- if eq .Values.vault.mode "token" }}
            {{- if .Values.vault.token.existingSecret }}
            - secretRef:
                name: {{ .Values.vault.token.existingSecret }}
            {{- else if .Values.vault.token.create }}
            - secretRef:
                name: {{ include "codemaster-backend.devSecretName" . }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.config.workspaceRoot }}
            - name: clone-cache
              mountPath: {{ .Values.config.cloneCacheRoot }}
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: workspace
          emptyDir:
            {{- with .Values.scratch.workspace.medium }}
            medium: {{ . }}
            {{- end }}
            sizeLimit: {{ .Values.scratch.workspace.sizeLimit }}
        - name: clone-cache
          emptyDir:
            {{- with .Values.scratch.cloneCache.medium }}
            medium: {{ . }}
            {{- end }}
            sizeLimit: {{ .Values.scratch.cloneCache.sizeLimit }}
        - name: tmp
          emptyDir:
            {{- with .Values.scratch.tmp.medium }}
            medium: {{ . }}
            {{- end }}
            sizeLimit: {{ .Values.scratch.tmp.sizeLimit }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

{{- /*
`helm test` smoke: curl /healthz + /readyz through the Service. Proves the pod
is serving HTTP. Deleted after run.
*/ -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "codemaster-backend.fullname" . }}-test-health
  labels:
    {{- include "codemaster-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: {{ .Values.tests.image | default "curlimages/curl:8.10.1" }}
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          base="http://{{ include "codemaster-backend.fullname" . }}:{{ .Values.service.port }}"
          echo "GET $base/healthz"; curl -fsS "$base/healthz" >/dev/null
          echo "GET $base/readyz";  curl -fsS "$base/readyz"  >/dev/null
          echo "OK"

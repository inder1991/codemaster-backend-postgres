{{- /*
`helm test` deploy-contract preflight: runs the SAME assertDeployReady the pod runs at boot
(node apps/backend/src/deploy_check.js), but standalone — validates that every required secret is
seeded, the pg_partman/vector extensions + schemas exist, and config is coherent. Exits non-zero
with an actionable remediation list if not. Uses the FULL Vault injection (file secrets + env DSN,
NOT onlyEnv) so it sees exactly what the app will. agent-pre-populate-only so the Pod can complete.
*/ -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "codemaster-backend.fullname" . }}-test-deploy-contract
  labels:
    {{- include "codemaster-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    {{- with (include "codemaster-backend.vaultAgentAnnotations" (dict "root" . "onlyEnv" false)) }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- if eq .Values.vault.mode "agent" }}
    vault.hashicorp.com/agent-pre-populate-only: "true"
    {{- end }}
spec:
  restartPolicy: Never
  serviceAccountName: {{ include "codemaster-backend.serviceAccountName" . }}
  # secretSource=vault resolves the DSN from Vault via SA-auth (same as the app), so the SA JWT
  # must mount — else helm test false-fails on a valid SA-auth deploy.
  automountServiceAccountToken: {{ if eq .Values.secretSource "vault" }}true{{ else }}{{ .Values.serviceAccount.automountServiceAccountToken }}{{ end }}
  {{- with .Values.image.pullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  securityContext:
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: deploy-check
      image: {{ include "codemaster-backend.image" . }}
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      {{- if include "codemaster-backend.usesEnvWrapper" . }}
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -a
          . {{ .Values.vault.secretsDir }}/runtime-env
          set +a
          exec node apps/backend/src/deploy_check.js
      {{- else if eq .Values.secretSource "vault" }}
      # vault SA-auth: resolve the DSN from Vault (the pod's SA login) before deploy_check — same preamble as
      # the app's boot, so the check validates the SAME contract the real pod sees (review P1).
      # `set -e` + separate assign/export + non-empty check so a resolve_dsn failure isn't masked by
      # `export VAR=$(cmd)` always exiting 0 (review P1).
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          CODEMASTER_PG_CORE_DSN="$(node apps/backend/src/resolve_dsn.js)"
          test -n "$CODEMASTER_PG_CORE_DSN" || { echo "resolve_dsn returned an empty DSN" >&2; exit 1; }
          export CODEMASTER_PG_CORE_DSN
          exec node apps/backend/src/deploy_check.js
      {{- else }}
      command: ["node", "apps/backend/src/deploy_check.js"]
      {{- end }}
      env:
        - name: HOME
          value: /tmp
        {{- with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      envFrom:
        # Same ConfigMap the app reads — so the check sees CODEMASTER_SECRET_SOURCE + VAULT_ADDR
        # + the SA-auth selectors (for resolve_dsn) + the PG DSN parts (openshift), NOT a hand-picked subset
        # that could diverge from the real pod and pass/fail a different contract (review P1).
        - configMapRef:
            name: {{ include "codemaster-backend.fullname" . }}-config
        {{- if eq .Values.vault.mode "token" }}
        {{- if .Values.vault.token.existingSecret }}
        - secretRef:
            name: {{ .Values.vault.token.existingSecret }}
        {{- else if .Values.vault.token.create }}
        - secretRef:
            name: {{ include "codemaster-backend.devSecretName" . }}
        {{- end }}
        {{- end }}
        {{- with .Values.extraEnvFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      securityContext:
        {{- toYaml .Values.containerSecurityContext | nindent 8 }}
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir:
        sizeLimit: 64Mi
